_subdirectory: template

user_name:
    type: str

user_email:
    type: str

project_name:
    type: str
    help: What is your project name?

project_module:
    type: str
    help: What is your Python module name?
    default: "{{project_name | lower | replace(' ','_')}}"
    validator: "{% if not project_module.isidentifier() %}Must be valid Python identifier{% endif %}"

use_feature_toggles:
    type: bool
    help: Do you want support for feature toggles?
    default: true

ts_integration:
    type: bool
    help: Do you want to build static assets with TypeScript?
    default: false

use_htmx:
    type: bool
    help: Do you want to use htmx for dynamic frontend interactions?
    when: "{{ ts_integration }}"
    default: false
